version: "3.9"

services:
  app:
    image: ghcr.io/lnsp/wealth:latest
    build:
      context: .
      args:
        BUILD_COMMIT: ${BUILD_COMMIT:-unknown}
        BUILD_TIME: ${BUILD_TIME:-unknown}
    ports:
      - "8443:8443"
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgres://finance:finance@db:5432/finance?sslmode=disable
      - PORT=8443
      - TZ=Europe/Berlin
      - BACKUP_PATH=/backups
    volumes:
      - backups:/backups
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8443/health"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp:size=64M
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - CHOWN
      - SETUID
      - SETGID

  db:
    image: docker.io/library/postgres:16-alpine
    environment:
      - POSTGRES_USER=finance
      - POSTGRES_PASSWORD=finance
      - POSTGRES_DB=finance
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finance"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped
    security_opt:
      - no-new-privileges
    cap_drop:
      - ALL
    cap_add:
      - DAC_OVERRIDE
      - SETGID
      - SETUID
      - FOWNER
      - CHOWN

volumes:
  pgdata:
  backups:
