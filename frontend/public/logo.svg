<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <!-- Background gradient: 135° natural light, soft blue tones -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5AC8FA"/>
      <stop offset="50%" stop-color="#007AFF"/>
      <stop offset="100%" stop-color="#0055D4"/>
    </linearGradient>

    <!-- Specular highlight: glass refraction sweep -->
    <radialGradient id="specular" cx="35%" cy="25%" r="60%" fx="30%" fy="20%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".38"/>
      <stop offset="40%" stop-color="#fff" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#fff" stop-opacity="0"/>
    </radialGradient>

    <!-- Frosted rim light -->
    <linearGradient id="rim" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity=".22"/>
      <stop offset="50%" stop-color="#fff" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".06"/>
    </linearGradient>

    <!-- Area glow beneath growth line -->
    <linearGradient id="areaGlow" x1="0" y1="380" x2="0" y2="780" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#fff" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#fff" stop-opacity=".03"/>
    </linearGradient>
  </defs>

  <!-- Layer 1: Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Layer 2: Glass specular -->
  <rect width="1024" height="1024" fill="url(#specular)"/>

  <!-- Layer 3: Rim light -->
  <rect width="1024" height="1024" fill="url(#rim)" opacity=".5"/>

  <!-- Layer 4: Foreground glyph -->
  <!-- Area fill -->
  <path d="M 220 700
           C 340 680, 480 540, 800 240
           L 800 800 L 220 800 Z"
        fill="url(#areaGlow)"/>

  <!-- Growth arc — single confident upward sweep -->
  <path d="M 220 700
           C 340 680, 480 540, 800 240"
        fill="none" stroke="#fff" stroke-width="56" stroke-linecap="round" opacity=".95"/>

  <!-- Endpoint dot -->
  <circle cx="800" cy="240" r="38" fill="#fff"/>
</svg>
