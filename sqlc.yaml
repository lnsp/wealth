version: "2"
sql:
  - engine: "postgresql"
    queries: "internal/database/queries.sql"
    schema: "migrations/"
    gen:
      go:
        package: "generated"
        out: "internal/database/generated"
        sql_package: "pgx/v5"
        emit_json_tags: true
        emit_empty_slices: true
        overrides:
          - db_type: "uuid"
            go_type: "github.com/google/uuid.UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
          - db_type: "timestamptz"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "timestamp"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "date"
            go_type:
              import: "time"
              type: "Time"
          - db_type: "jsonb"
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - db_type: "jsonb"
            nullable: true
            go_type:
              import: "encoding/json"
              type: "RawMessage"
          - column: "current_holdings.security_isin"
            go_type: "string"
          - column: "current_holdings.quantity"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
          - column: "current_holdings.avg_cost_basis"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
          - column: "current_holdings.total_dividends"
            go_type:
              import: "github.com/jackc/pgx/v5/pgtype"
              type: "Numeric"
        rename:
          isin: "ISIN"
          iban: "IBAN"
          wkn: "WKN"
          ter: "TER"
          etf_isin: "ETFISIN"
          holding_isin: "HoldingISIN"
          security_isin: "SecurityISIN"
          import_security_isin: "ImportSecurityISIN"
          totp_secret: "TOTPSecret"
          totp_enabled: "TOTPEnabled"
          etf_holding: "ETFHolding"
          etf_holdings: "ETFHoldings"
